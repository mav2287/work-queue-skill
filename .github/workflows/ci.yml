name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Reject OS and IDE metadata
        run: |
          set -euo pipefail
          offenders=$(find . \
            \( -path ./.git -o -path ./node_modules \) -prune -o \
            \( -name .DS_Store -o -name Thumbs.db -o -name Desktop.ini \
               -o -path '*/.idea/*' -o -path '*/.vscode/*' \) -print)
          if [ -n "$offenders" ]; then
            echo "::error::OS or IDE metadata present in working tree:"
            echo "$offenders"
            exit 1
          fi
      - name: Compile scripts
        run: python3 -m py_compile scripts/validate_skill.py work-queue/scripts/validate_queue.py
      - name: Install dev tools
        run: python3 -m pip install --quiet mypy==2.1.0
      - name: Type-check validators
        run: python3 -m mypy --strict scripts/validate_skill.py work-queue/scripts/validate_queue.py
      - name: Smoke-check skill metadata
        run: python3 scripts/validate_skill.py work-queue
      - name: Validate starter queue
        run: python3 work-queue/scripts/validate_queue.py --strict-sections work-queue/templates/WORK_QUEUE.md
      - name: Validate sample queue
        run: python3 work-queue/scripts/validate_queue.py --strict-sections work-queue/examples/sample-queue.md
      - name: Run regression tests
        run: python3 -m unittest discover -s tests
