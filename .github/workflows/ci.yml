name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile scripts
        run: python3 -m py_compile work-queue/scripts/validate_queue.py
      - name: Validate starter queue
        run: python3 work-queue/scripts/validate_queue.py work-queue/templates/WORK_QUEUE.md
