name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate skill metadata
        run: python3 scripts/validate_skill.py work-queue

      - name: Validate bundled queue fixtures
        run: |
          python3 work-queue/scripts/validate_queue.py --strict-sections \
            work-queue/templates/WORK_QUEUE.md \
            work-queue/examples/sample-queue.md

      - name: Run regression tests
        run: python3 -m unittest discover -s tests

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          python3 - <<'PY' > release_notes.md
          import os
          import re
          version = os.environ["VERSION"]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              re.DOTALL | re.MULTILINE,
          )
          match = pattern.search(text)
          if not match:
              raise SystemExit(
                  f"CHANGELOG.md has no section for [{version}]; refusing to release"
              )
          print(match.group(1).strip())
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build plugin zip
        run: |
          version="${{ steps.version.outputs.version }}"
          plugin_zip="work-queue-plugin-${version}.zip"
          skill_zip="work-queue-${version}.zip"
          # Plugin zip: full plugin root (manifests + skill subdir).
          # Installable via `claude --plugin-dir <zip>` or unzipped into
          # ~/.claude/plugins/cache/ when fetched by the marketplace.
          zip -r "$plugin_zip" .claude-plugin work-queue commands -x '*.DS_Store'
          # Skill zip: legacy bare-skill bundle, for users who rsync into
          # ~/.claude/skills/work-queue/ directly.
          (cd work-queue && zip -r "../$skill_zip" . -x '*.DS_Store')
          {
            echo "PLUGIN_ZIP=$plugin_zip"
            echo "SKILL_ZIP=$skill_zip"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            ${{ env.PLUGIN_ZIP }}
            ${{ env.SKILL_ZIP }}
          fail_on_unmatched_files: true
